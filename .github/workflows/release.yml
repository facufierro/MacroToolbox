name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')

          # tauri.conf.json
          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 20 | Set-Content src-tauri/tauri.conf.json

          # Cargo.toml (first occurrence of version = "...")
          $cargo = Get-Content src-tauri/Cargo.toml
          $updated = $false
          $cargo = $cargo | ForEach-Object {
            if (-not $updated -and $_ -match '^version\s*=\s*"') {
              $updated = $true
              "version = `"$version`""
            } else { $_ }
          }
          $cargo | Set-Content src-tauri/Cargo.toml

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run tauri build
        env:
          CARGO_INCREMENTAL: '0'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
