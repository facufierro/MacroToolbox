name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify release artifacts
        shell: bash
        run: |
          test -d "releases/${{ github.ref_name }}"
          test -f "changelog/${{ github.ref_name }}.md"
          find "releases/${{ github.ref_name }}" -maxdepth 1 -type f -name '*setup.exe' | grep .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog/${{ github.ref_name }}.md
          files: releases/${{ github.ref_name }}/*setup.exe
